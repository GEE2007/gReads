<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book</title>
  <link rel="stylesheet" href="stylesheet.css">
  </head>
  <header>
    <div class="navbar">
            <div class="navlogo border">
                <div class="logo"></div>
            </div>
            <nav class="navlinks">
                <a href="#">Home</a>
                <a href="genre.html">Genre</a>
                <a href="explore.html">Explore</a>
                <a href="#">Trending</a>
                <a href="myBooks.html">My Books</a>
            </nav>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Search books, authors, genres...">
                <i class="fas fa-search search-icon"></i>
            </div>
            <div class="profile-menu">
                <div class="profile-icon" id="profileToggle" aria-haspopup="true" aria-expanded="false">GB</div>
                <div class="profile-dropdown" id="profileDropdown" role="menu" aria-label="Profile menu">
                    <a href="#" role="menuitem">My Profile</a>
                    <a href="tbr.html" role="menuitem">TBR</a>
                    <a href="#" role="menuitem">My Library</a>
                    <a href="#" role="menuitem">Settings</a>
                    <a href="#" role="menuitem">Logout</a>
                </div>
            </div>
        </div>
</header>
<body>
    <div class="book-page">

  <div class="left">
    <img class="book-img" alt="Book Cover">
  </div>

  <div class="right">

    <h1 class="book-title"></h1>
    <p class="author"></p>
    <div class="tags"></div>
    <div class="tropes"></div>
    <p class="book-desc"></p>

    <div class="rating">⭐⭐⭐⭐☆</div>

    <div class="actions">
  <button class="tbr-btn">Add to TBR</button>
  <button class="recommend-btn">📢 Recommend</button>
  <button class="read-btn">Mark as Read</button>
  <button class="dnf-btn">Mark as DNF</button>
</div>
<div class="playlist">
 <h3>Reading Vibes 🎵</h3>
 <a class="playlist-link" target="_blank">Open Playlist</a>
</div>

<div class="review-form">
  <h3>Write a Review</h3>
  <div class="review-rating-input">
    <span class="review-rating-label">Your rating</span>
    <div class="review-stars" role="radiogroup" aria-label="Star rating selector">
      <span class="review-star" data-value="1">☆</span>
      <span class="review-star" data-value="2">☆</span>
      <span class="review-star" data-value="3">☆</span>
      <span class="review-star" data-value="4">☆</span>
      <span class="review-star" data-value="5">☆</span>
    </div>
  </div>
  <label class="review-text-label" for="review-textarea">Review</label>
  <textarea id="review-textarea" class="review-textarea" rows="4" placeholder="Share your thoughts about the book..."></textarea>
  <button class="submit-review-btn" type="button">Submit Review</button>
</div>

<div class="reviews">
  <h3>Reviews</h3>
  <div class="reviews-container"></div>
</div>
  </div>
</div>
<script src="shelfManager.js"></script>
<script src="script.js"></script>
<script src="search.js"></script>
<script src="book.js"></script>
<script>
        const profileToggle = document.getElementById('profileToggle');
        const profileMenu = document.querySelector('.profile-menu');
        const closeProfileMenu = () => {
            profileMenu.classList.remove('open');
            profileToggle.setAttribute('aria-expanded', 'false');
        };

        profileToggle.addEventListener('click', (event) => {
            event.stopPropagation();
            const isOpen = profileMenu.classList.toggle('open');
            profileToggle.setAttribute('aria-expanded', isOpen);
        });

        document.addEventListener('click', (event) => {
            if (!profileMenu.contains(event.target)) {
                closeProfileMenu();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeProfileMenu();
            }
        });
    </script>
</body>
</html>
