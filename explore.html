<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore | gReads</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>

<body id="explore-body">
<header>
    <div class="navbar">
            <div class="navlogo border">
                <div class="logo"></div>
            </div>
            <nav class="navlinks">
                <a href="#">Home</a>
                <a href="genre.html">Genre</a>
                <a href="explore.html">Explore</a>
                <a href="#">Trending</a>
                <a href="myBooks.html">My Books</a>
            </nav>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Search books, authors, genres...">
                <i class="fas fa-search search-icon"></i>
            </div>
            <div class="profile-menu">
                <div class="profile-icon" id="profileToggle" aria-haspopup="true" aria-expanded="false">GB</div>
                <div class="profile-dropdown" id="profileDropdown" role="menu" aria-label="Profile menu">
                    <a href="profile.html" role="menuitem">My Profile</a>
                    <a href="tbr.html" role="menuitem">TBR</a>
                    <a href="settings.html" role="menuitem">Settings</a>
                    <a href="#" role="menuitem">Logout</a>
                </div>
            </div>
        </div>
</header>
<section class="explore-page">
  <h1>Explore Books</h1>
  <p class="subtext">Find your next obsession ✨</p>
  <p class="hint">Use ← → to swipe</p>

  <div class="swipe-wrapper">

    <div class="tbr-popup">Added to TBR 💖</div>

  </div>
</section>

<footer class="footer">
  <p>© 2026 gReads. Made with ❤️</p>
</footer>
<script src="shelfManager.js"></script>
<script src="script.js"></script>
<script src="search.js"></script>
<script src="navbar.js"></script>
<script src="theme.js"></script>
<script>
        const profileToggle = document.getElementById('profileToggle');
        const profileMenu = document.querySelector('.profile-menu');
        const closeProfileMenu = () => {
            profileMenu.classList.remove('open');
            profileToggle.setAttribute('aria-expanded', 'false');
        };

        profileToggle.addEventListener('click', (event) => {
            event.stopPropagation();
            const isOpen = profileMenu.classList.toggle('open');
            profileToggle.setAttribute('aria-expanded', isOpen);
        });

        document.addEventListener('click', (event) => {
            if (!profileMenu.contains(event.target)) {
                closeProfileMenu();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeProfileMenu();
            }
        });
    </script>
</body>
</html>
