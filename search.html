<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results — gReads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="stylesheet.css">
    <style>
        .search-results {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .search-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .search-query {
            color: #8b5cf6;
            font-weight: bold;
        }
        .results-count {
            color: #666;
            font-size: 0.9rem;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .result-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
        }
        .result-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .result-card h3 {
            margin: 0 0 0.5rem 0;
            color: #333;
            font-size: 1.1rem;
        }
        .result-card .author {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .result-card .genre {
            display: inline-block;
            background: #f3f4f6;
            color: #374151;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
        }
        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="navlogo border">
                <div class="logo"></div>
            </div>
            <nav class="navlinks">
                <a href="index.html">Home</a>
                <a href="genre.html">Genre</a>
                <a href="explore.html">Explore</a>
                <a href="#">Trending</a>
                <a href="myBooks.html">My Books</a>
            </nav>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Search books, authors, genres...">
                <i class="fas fa-search search-icon"></i>
            </div>
            <div class="profile-menu">
                <div class="profile-icon" id="profileToggle" aria-haspopup="true" aria-expanded="false">GB</div>
                <div class="profile-dropdown" id="profileDropdown" role="menu" aria-label="Profile menu">
                    <a href="profile.html" role="menuitem">My Profile</a>
                    <a href="tbr.html" role="menuitem">TBR</a>
                    <a href="settings.html" role="menuitem">Settings</a>
                    <a href="#" role="menuitem">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <main class="search-results">
        <div class="search-header">
            <h1>Search Results</h1>
            <p class="results-count">Showing results for "<span class="search-query"></span>"</p>
        </div>
        <div id="resultsContainer" class="results-grid">
            <!-- Results will be populated by JavaScript -->
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 gReads. Made with ❤️</p>
    </footer>

    <script src="script.js"></script>
    <script src="search.js"></script>
    <script src="navbar.js"></script>
    <script src="theme.js"></script>
    <script>
        
        const profileToggle = document.getElementById('profileToggle');
        const profileMenu = document.querySelector('.profile-menu');

        profileToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = profileMenu.classList.toggle('open');
            profileToggle.setAttribute('aria-expanded', isOpen);
        });

        document.addEventListener('click', (e) => {
            if (!profileMenu.contains(e.target)) {
                profileMenu.classList.remove('open');
                profileToggle.setAttribute('aria-expanded', 'false');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                profileMenu.classList.remove('open');
                profileToggle.setAttribute('aria-expanded', 'false');
            }
        });

        // Search results functionality
        function displaySearchResults() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');

            if (!query) {
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>No search query provided</h3>
                        <p>Try searching for books, authors, or genres!</p>
                    </div>
                `;
                return;
            }

            // Set the search bar value to the current query
            document.querySelector('.search-bar').value = query;

            document.querySelector('.search-query').textContent = query;

            const lowerQuery = query.toLowerCase();
            const filteredBooks = books.filter(book =>
                (book.title && book.title.toLowerCase().includes(lowerQuery)) ||
                (book.author && book.author.toLowerCase().includes(lowerQuery)) ||
                (book.genre && book.genre.some(g => g.toLowerCase().includes(lowerQuery)))
            );

            const resultsContainer = document.getElementById('resultsContainer');

            if (filteredBooks.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>No results found</h3>
                        <p>Try different keywords or check your spelling.</p>
                    </div>
                `;
                return;
            }

            // Update results count
            document.querySelector('.results-count').textContent =
                `Found ${filteredBooks.length} result${filteredBooks.length === 1 ? '' : 's'} for "${query}"`;

            resultsContainer.innerHTML = filteredBooks.map(book => `
                <div class="result-card" onclick="viewBook('${book.title}')">
                    <img src="${book.image}" alt="${book.title} cover">
                    <h3>${book.title}</h3>
                    <p class="author">by ${book.author}</p>
                    ${book.genre.map(g => `<span class="genre">${g}</span>`).join('')}
                </div>
            `).join('');
        }

        function viewBook(title) {
            // Find the book and navigate to book details page
            const book = books.find(b => b.title === title);
            if (book) {
                localStorage.setItem("selectedBook", JSON.stringify(book));
                window.location.href = "book.html";
            } else {
                alert(`Book "${title}" not found`);
            }
        }

        // Initialize search results on page load
        displaySearchResults();
    </script>
</body>
</html>
